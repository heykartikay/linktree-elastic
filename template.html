<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{description}}" />
  <meta property="og:title" content="{{name}}" />
  <meta property="og:description" content="{{description}}" />
  <title>{{name}}</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="icon" href="https://www.elastic.co/favicon.ico" />
</head>
<body data-region="{{region_slug}}">
  <div class="container">
    <header>
      <img src="/assets/images/elastic-logo.svg" alt="Elastic" class="logo" />
      <h1>{{name}}</h1>
      <p class="description">{{description}}</p>
    </header>

    <main>
      {{links}}
    </main>

    <footer>
      <p>
        <a href="https://www.elastic.co/community/codeofconduct" target="_blank" rel="noopener">Code of Conduct</a>
        &bull;
        <a href="https://www.elastic.co/legal/privacy-statement" target="_blank" rel="noopener">Privacy</a>
        &bull;
        <a href="https://www.elastic.co/legal/terms-of-use" target="_blank" rel="noopener">Terms</a>
      </p>
    </footer>
  </div>
  <script>
    const region = document.body.dataset.region || 'index';

    function track(payload) {
      navigator.sendBeacon
        ? navigator.sendBeacon('/api/track', new Blob([JSON.stringify(payload)], { type: 'application/json' }))
        : fetch('/api/track', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), keepalive: true });
    }

    // Page view
    track({ type: 'page_view', region, referrer: document.referrer });

    // Link clicks
    document.querySelectorAll('a.link-button, a.region-card').forEach(a => {
      a.addEventListener('click', () => track({
        type: 'link_click',
        region,
        link: a.querySelector('span')?.textContent.trim() || a.textContent.trim(),
        url: a.href
      }));
    });
  </script>
</body>
</html>
