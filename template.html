<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{description}}" />
  <meta property="og:title" content="{{name}}" />
  <meta property="og:description" content="{{description}}" />
  <title>{{name}}</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="icon" href="https://www.elastic.co/favicon.ico" />
</head>
<body>

      <div class="logo-wordmark">elastic<span>.</span></div>

    <main>
      {{links}}
    </main>

    <footer>
      <p>
        <a href="https://www.elastic.co/community/codeofconduct" target="_blank" rel="noopener">Code of Conduct</a>
        &bull;
        <a href="https://www.elastic.co/legal/privacy-statement" target="_blank" rel="noopener">Privacy</a>
        &bull;
        <a href="https://www.elastic.co/legal/terms-of-use" target="_blank" rel="noopener">Terms</a>
      </p>
    </footer>

</html>
